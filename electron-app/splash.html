<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video2Text</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .subtitle {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 32px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #334155;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #log {
      font-size: 11px;
      color: #94a3b8;
      text-align: center;
      max-width: 400px;
      min-height: 40px;
      line-height: 1.4;
    }
    .version {
      position: absolute;
      bottom: 12px;
      font-size: 10px;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="logo">&#127916;</div>
  <h1>Video2Text</h1>
  <p class="subtitle">AI Video Transcription</p>
  <div class="spinner"></div>
  <div id="log">Starting up...</div>
  <div class="version">v1.0.0</div>
  <script>
    if (window.electronAPI && window.electronAPI.onSplashLog) {
      window.electronAPI.onSplashLog((msg) => {
        document.getElementById('log').textContent = msg;
      });
    }
  </script>
</body>
</html>
